# Titanic survival — binary classification demo.
# Column schema drives pandera validation, preprocessing groups, and the serving API.
source:
  type: csv
  path: data/raw/titanic.csv
target: Survived
task: classification
split:
  strategy: stratified
  test_size: 0.15
  val_size: 0.15
columns:
  - { name: PassengerId, dtype: int, role: id }
  - { name: Survived, dtype: int, allowed_values: [0, 1] }
  - { name: Pclass, dtype: category, allowed_values: [1, 2, 3] }
  - { name: Name, dtype: string, role: drop }
  - { name: Sex, dtype: category, allowed_values: [male, female] }
  - { name: Age, dtype: float, nullable: true, ge: 0, le: 100 }
  - { name: SibSp, dtype: int, ge: 0 }
  - { name: Parch, dtype: int, ge: 0 }
  - { name: Ticket, dtype: string, role: drop }
  - { name: Fare, dtype: float, nullable: true, ge: 0 }
  - { name: Cabin, dtype: string, nullable: true }
  - { name: Embarked, dtype: category, nullable: true, allowed_values: [C, Q, S] }
