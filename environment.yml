name: ml-template
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # core data stack
  - numpy>=1.26,<2.2
  - pandas>=2.2,<2.4
  - pyarrow>=15
  - scikit-learn>=1.6,<1.8
  - imbalanced-learn>=0.13,<0.15
  # gradient boosting
  - xgboost>=2.1,<3.1
  - lightgbm>=4.5,<5
  - catboost>=1.2.7
  # deep learning (CPU build resolved automatically on this host)
  - pytorch>=2.5,<2.8
  - lightning>=2.4,<2.6
  # experiment management
  - optuna>=4.0,<5
  - mlflow>=2.22,<4
  # explainability / validation / config
  - shap>=0.46,<0.49
  - pandera>=0.20,<0.25
  - pydantic>=2.7,<3
  - pyyaml>=6
  # visualization
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.24
  # serving
  - fastapi>=0.111,<1
  - uvicorn>=0.30
  # dev / test
  - pytest>=8
  - pytest-cov
  - httpx
  - ruff
  - joblib>=1.4
  - pip:
      - lime>=0.2.0.1
